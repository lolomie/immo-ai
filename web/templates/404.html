{% extends "base.html" %}
{% block title %}Seite nicht gefunden — Immo AI{% endblock %}
{% block content %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 128px); padding:2rem; text-align:center;">
  <div style="font-size:4rem; margin-bottom:1rem;">🔍</div>
  <h1 style="font-size:1.75rem; font-weight:800; color:var(--navy); letter-spacing:-.03em; margin-bottom:.75rem;">Seite nicht gefunden</h1>
  <p style="color:var(--slate); font-size:1rem; max-width:400px; line-height:1.6; margin-bottom:2rem;">
    Die angeforderte Seite existiert nicht. Vielleicht wurde sie verschoben oder der Link ist falsch.
  </p>
  <div style="display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;">
    <a href="/" class="btn btn-primary">Zur Startseite</a>
    <a href="/generate" class="btn btn-outline">Generator öffnen</a>
  </div>
</div>
{% endblock %}
