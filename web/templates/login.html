<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Immo AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #070e1d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(37,99,235,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-wrap {
      width: 100%; max-width: 400px;
      animation: loginIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes loginIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.75rem 2.5rem;
      box-shadow: 0 24px 64px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.06);
    }
    .logo {
      text-align: center;
      margin-bottom: 2.25rem;
    }
    .logo-text {
      font-size: 1.875rem;
      font-weight: 900;
      color: #0f172a;
      letter-spacing: -.06em;
      line-height: 1;
    }
    .logo-text span { color: #2563eb; }
    .logo-sub {
      font-size: .8125rem;
      color: #64748b;
      margin-top: .375rem;
      font-weight: 500;
    }
    .field { margin-bottom: .875rem; }
    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: .35rem;
    }
    input {
      width: 100%;
      padding: .7rem .9rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      font-size: .9375rem;
      color: #1e293b;
      background: #fff;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
      font-family: inherit;
    }
    input:hover:not(:focus) { border-color: #cbd5e1; }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: #fafcff;
    }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 8px;
      padding: .7rem .9rem;
      font-size: .875rem;
      margin-bottom: 1.125rem;
      display: {% if error %}flex{% else %}none{% endif %};
      align-items: center;
      gap: .5rem;
    }
    .submit-btn {
      width: 100%;
      padding: .8rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: .9375rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      font-family: inherit;
      margin-top: .5rem;
      letter-spacing: -.01em;
    }
    .submit-btn:hover {
      background: #1d4ed8;
      box-shadow: 0 6px 18px rgba(37,99,235,.35);
      transform: translateY(-1px);
    }
    .submit-btn:active { background: #1e40af; transform: translateY(0); }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.375rem;
      font-size: .8125rem;
      color: #94a3b8;
      text-decoration: none;
      transition: color 180ms ease;
    }
    .back-link:hover { color: #64748b; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">
        <div class="logo-text"><span>Immo</span> AI</div>
        <div class="logo-sub">Interner Zugang</div>
      </div>

      {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label for="username">Benutzername</label>
          <input type="text" id="username" name="username" autocomplete="username"
                 value="{{ username or '' }}" autofocus required>
        </div>
        <div class="field">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="submit-btn">Anmelden</button>
      </form>

      <a href="/" class="back-link">← Zurück zur Startseite</a>
    </div>
  </div>
</body>
</html>
