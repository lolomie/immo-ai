<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immo AI Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 40px rgba(0,0,0,.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-text {
      font-size: 1.75rem;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -.04em;
    }
    .logo-text span { color: #2563eb; }
    .logo-sub {
      font-size: .8125rem;
      color: #64748b;
      margin-top: .25rem;
    }
    h1 {
      font-size: 1.125rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 1.5rem;
      letter-spacing: -.02em;
    }
    .field { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: .35rem;
    }
    input {
      width: 100%;
      padding: .65rem .875rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: .9375rem;
      color: #1e293b;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 7px;
      padding: .65rem .875rem;
      font-size: .875rem;
      margin-bottom: 1.25rem;
      display: {% if error %}block{% else %}none{% endif %};
    }
    button {
      width: 100%;
      padding: .75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      font-family: inherit;
      margin-top: .5rem;
    }
    button:hover { background: #1d4ed8; }
    button:active { background: #1e40af; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-text"><span>Immo</span> AI</div>
      <div class="logo-sub">Interner Zugang</div>
    </div>

    <div class="error">{{ error }}</div>

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username" autocomplete="username"
               value="{{ username or '' }}" autofocus required>
      </div>
      <div class="field">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Anmelden</button>
    </form>
  </div>
</body>
</html>
