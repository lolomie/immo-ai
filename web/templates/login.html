<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden — Immo AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
      background: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      animation: rise .55s cubic-bezier(0.25,0.46,0.45,0.94) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2.75rem 2.5rem 2.5rem;
      box-shadow: 0 32px 80px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.04);
    }

    .logo {
      text-align: center;
      margin-bottom: 2.25rem;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -.05em;
      color: #1d1d1f;
      line-height: 1;
    }
    .logo-mark span { color: #0066cc; }
    .logo-sub {
      font-size: .8125rem;
      color: #86868b;
      margin-top: .375rem;
      font-weight: 400;
      letter-spacing: .005em;
    }

    .error-box {
      background: #fff2f2;
      border: 1px solid #f5c6c6;
      color: #8a0000;
      border-radius: 10px;
      padding: .75rem 1rem;
      font-size: .875rem;
      margin-bottom: 1.25rem;
      display: {% if error %}flex{% else %}none{% endif %};
      align-items: flex-start;
      gap: .5rem;
      line-height: 1.5;
    }

    .field { margin-bottom: .875rem; }
    label {
      display: block;
      font-size: .8125rem;
      font-weight: 500;
      color: #3d3d3f;
      margin-bottom: .375rem;
      letter-spacing: -.01em;
    }
    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      padding: .6875rem .9375rem;
      border: 1px solid #d2d2d7;
      border-radius: 10px;
      font-size: .9375rem;
      color: #1d1d1f;
      background: #fff;
      font-family: inherit;
      transition: border-color .2s ease, box-shadow .2s ease;
      -webkit-appearance: none;
    }
    input:hover:not(:focus) { border-color: #86868b; }
    input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0,102,204,.12);
    }

    .submit-btn {
      width: 100%;
      padding: .8125rem;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 980px;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 1.125rem;
      letter-spacing: -.01em;
      transition: background .2s ease, box-shadow .2s ease, transform .15s ease;
    }
    .submit-btn:hover {
      background: #004ea8;
      box-shadow: 0 4px 16px rgba(0,102,204,.28);
      transform: translateY(-1px);
    }
    .submit-btn:active { transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.375rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e8ed;
    }
    .divider span { font-size: .8125rem; color: #86868b; font-weight: 400; white-space: nowrap; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .625rem;
      width: 100%;
      padding: .75rem;
      border: 1px solid #d2d2d7;
      border-radius: 980px;
      font-size: .9375rem;
      font-weight: 500;
      color: #1d1d1f;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      letter-spacing: -.01em;
      transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease;
    }
    .google-btn:hover {
      border-color: #86868b;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transform: translateY(-1px);
      text-decoration: none;
    }
    .google-btn:active { transform: none; }

    .back {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: .8125rem;
      color: #86868b;
      text-decoration: none;
      transition: color .2s ease;
    }
    .back:hover { color: #3d3d3f; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">
        <div class="logo-mark"><span>Immo</span> AI</div>
        <div class="logo-sub">Interner Zugang</div>
      </div>

      {% if error %}
      <div class="error-box">
        <span style="flex-shrink:0;font-size:1rem;">⚠</span>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label for="username">Benutzername</label>
          <input type="text" id="username" name="username"
                 autocomplete="username" value="{{ username or '' }}"
                 autofocus required>
        </div>
        <div class="field">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password"
                 autocomplete="current-password" required>
        </div>
        <button type="submit" class="submit-btn">Anmelden</button>
      </form>

      <div class="divider"><span>oder</span></div>

      <a href="/auth/google" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Mit Google anmelden
      </a>

      <a href="/" class="back">← Zurück zur Startseite</a>
    </div>
  </div>
</body>
</html>
