<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Immo AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #070e1d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(37,99,235,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-wrap {
      width: 100%; max-width: 400px;
      animation: loginIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes loginIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.75rem 2.5rem;
      box-shadow: 0 24px 64px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.06);
    }
    .logo {
      text-align: center;
      margin-bottom: 2.25rem;
    }
    .logo-text {
      font-size: 1.875rem;
      font-weight: 900;
      color: #0f172a;
      letter-spacing: -.06em;
      line-height: 1;
    }
    .logo-text span { color: #2563eb; }
    .logo-sub {
      font-size: .8125rem;
      color: #64748b;
      margin-top: .375rem;
      font-weight: 500;
    }
    .field { margin-bottom: .875rem; }
    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: .35rem;
    }
    input {
      width: 100%;
      padding: .7rem .9rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      font-size: .9375rem;
      color: #1e293b;
      background: #fff;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
      font-family: inherit;
    }
    input:hover:not(:focus) { border-color: #cbd5e1; }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: #fafcff;
    }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 8px;
      padding: .7rem .9rem;
      font-size: .875rem;
      margin-bottom: 1.125rem;
      display: {% if error %}flex{% else %}none{% endif %};
      align-items: center;
      gap: .5rem;
    }
    .submit-btn {
      width: 100%;
      padding: .8rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: .9375rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      font-family: inherit;
      margin-top: .5rem;
      letter-spacing: -.01em;
    }
    .submit-btn:hover {
      background: #1d4ed8;
      box-shadow: 0 6px 18px rgba(37,99,235,.35);
      transform: translateY(-1px);
    }
    .submit-btn:active { background: #1e40af; transform: translateY(0); }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.375rem;
      font-size: .8125rem;
      color: #94a3b8;
      text-decoration: none;
      transition: color 180ms ease;
    }
    .back-link:hover { color: #64748b; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">
        <div class="logo-text"><span>Immo</span> AI</div>
        <div class="logo-sub">Interner Zugang</div>
      </div>

      {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label for="username">Benutzername</label>
          <input type="text" id="username" name="username" autocomplete="username"
                 value="{{ username or '' }}" autofocus required>
        </div>
        <div class="field">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="submit-btn">Anmelden</button>
      </form>

      <div style="display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;">
        <div style="flex:1;height:1px;background:#e2e8f0;"></div>
        <span style="font-size:.8125rem;color:#94a3b8;font-weight:500;">oder</span>
        <div style="flex:1;height:1px;background:#e2e8f0;"></div>
      </div>

      <a href="/auth/google" style="
        display:flex;align-items:center;justify-content:center;gap:.625rem;
        width:100%;padding:.75rem;border:1.5px solid #e2e8f0;border-radius:9px;
        font-size:.9375rem;font-weight:600;color:#1e293b;text-decoration:none;
        background:#fff;transition:border-color 180ms,box-shadow 180ms,transform 180ms;
        font-family:inherit;
      " onmouseover="this.style.borderColor='#94a3b8';this.style.boxShadow='0 2px 8px rgba(0,0,0,.08)';this.style.transform='translateY(-1px)'"
         onmouseout="this.style.borderColor='#e2e8f0';this.style.boxShadow='none';this.style.transform='none'">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Mit Google anmelden
      </a>

      <a href="/" class="back-link">← Zurück zur Startseite</a>
    </div>
  </div>
</body>
</html>
