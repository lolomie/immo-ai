<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      border: 2px solid #0f3460;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      background: #16213e;
      padding: 0.8rem 2rem;
      border-radius: 12px;
      border: 1px solid #0f3460;
    }

    .score-item {
      text-align: center;
    }

    .score-label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: 700;
    }

    #score-x .score-value { color: #e94560; }
    #score-draw .score-value { color: #f0a500; }
    #score-o .score-value { color: #a8dadc; }

    #reset-btn {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset-btn:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #mode-toggle {
      margin-top: 0.8rem;
      padding: 0.4rem 1.5rem;
      background: transparent;
      color: #a8dadc;
      border: 1px solid #a8dadc;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    #mode-toggle:hover {
      background: #a8dadc;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scoreboard">
    <div class="score-item" id="score-x">
      <div class="score-label">X Wins</div>
      <div class="score-value" id="x-val">0</div>
    </div>
    <div class="score-item" id="score-draw">
      <div class="score-label">Draws</div>
      <div class="score-value" id="draw-val">0</div>
    </div>
    <div class="score-item" id="score-o">
      <div class="score-label">O Wins</div>
      <div class="score-value" id="o-val">0</div>
    </div>
  </div>

  <button id="reset-btn">New Game</button>
  <button id="mode-toggle">vs Computer: OFF</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board, current, gameOver, vsComputer;
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const xVal = document.getElementById('x-val');
    const oVal = document.getElementById('o-val');
    const drawVal = document.getElementById('draw-val');
    const modeBtn = document.getElementById('mode-toggle');

    vsComputer = false;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = "Player X's turn";
    }

    function checkWin(b, p) {
      return WINS.find(([a, b2, c]) => b[a] === p && b[b2] === p && b[c] === p);
    }

    function checkDraw(b) {
      return b.every(v => v !== '');
    }

    function highlightWin(combo) {
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function handleMove(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const win = checkWin(board, current);
      if (win) {
        highlightWin(win);
        status.textContent = vsComputer && current === 'O' ? '🤖 Computer wins!' : `Player ${current} wins!`;
        scores[current]++;
        updateScores();
        gameOver = true;
        return;
      }
      if (checkDraw(board)) {
        status.textContent = "It's a draw!";
        scores.D++;
        updateScores();
        gameOver = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';

      if (vsComputer && current === 'O') {
        status.textContent = '🤖 Computer is thinking...';
        setTimeout(computerMove, 350);
      } else {
        status.textContent = `Player ${current}'s turn`;
      }
    }

    function computerMove() {
      const move = bestMove();
      handleMove(move);
    }

    function minimax(b, isMax) {
      const win = checkWin(b, 'O');
      if (win) return 10;
      if (checkWin(b, 'X')) return -10;
      if (checkDraw(b)) return 0;

      if (isMax) {
        let best = -Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, false));
            b[i] = '';
          }
        });
        return best;
      } else {
        let best = Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, true));
            b[i] = '';
          }
        });
        return best;
      }
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      board.forEach((v, i) => {
        if (!v) {
          board[i] = 'O';
          const score = minimax(board, false);
          board[i] = '';
          if (score > best) { best = score; move = i; }
        }
      });
      return move;
    }

    function updateScores() {
      xVal.textContent = scores.X;
      oVal.textContent = scores.O;
      drawVal.textContent = scores.D;
    }

    cells.forEach(cell => cell.addEventListener('click', () => {
      if (vsComputer && current === 'O') return;
      handleMove(+cell.dataset.i);
    }));

    document.getElementById('reset-btn').addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = `vs Computer: ${vsComputer ? 'ON' : 'OFF'}`;
      scores = { X: 0, O: 0, D: 0 };
      updateScores();
      init();
    });

    init();
  </script>
</body>
</html>
